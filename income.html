<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Income Entry — The New Shop</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green-light: #EAF3DE;
      --green-mid:   #639922;
      --green-dark:  #3B6D11;
      --green-deep:  #27500A;
      --surface:     #f5f4f0;
      --card:        #ffffff;
      --border:      #e8e6e0;
      --text:        #1a1a18;
      --text-muted:  #888780;
      --text-faint:  #b4b2a9;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      color: var(--text);
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .display-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .display-pill {
      flex: 1;
      padding: 14px;
      background: var(--surface);
      border-radius: 12px;
    }

    .total-block {
      background: var(--green-light);
      padding: 1.25rem;
      display: flex;
      justify-content: space-between;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: var(--green-dark);
      color: white;
      border-radius: 12px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="index.html" class="back">← The New Shop</a>

    <div class="page-header">
      <p>Daily Entry</p>
      <h1>Income</h1>
    </div>

    <!-- Date -->
    <div class="card">
      <input type="date" id="dateInput" />
    </div>

    <!-- Cash -->
    <div class="card">
      <div class="grid-2">
        <input type="text" id="openingCash" placeholder="Opening" />
        <input type="text" id="closingCash" placeholder="Closing" />
      </div>
    </div>

    <!-- UPI -->
    <div class="card">
      <input type="text" id="upiIncome" placeholder="UPI Income" />
    </div>

    <!-- Display -->
    <div class="display-row">
      <div class="display-pill">
        Cash: ₹<span id="cashVal">0</span>
      </div>
      <div class="display-pill">
        UPI: ₹<span id="upiVal">0</span>
      </div>
    </div>

    <div class="total-block">
      <span>Total</span>
      <span>₹<span id="total">0</span></span>
    </div>

    <button class="btn-save" onclick="saveIncome()">Save</button>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script>
    function parseNumber(value) {
      if (!value) return 0;
      return value.split(",").reduce((sum, v) => sum + (parseFloat(v) || 0), 0);
    }

    function calculate() {  
      const open = parseNumber(document.getElementById("openingCash").value);
      const close = parseNumber(document.getElementById("closingCash").value);
      const upi = parseNumber(document.getElementById("upiIncome").value);

      const cash = close - open;
      const total = cash + upi;

      document.getElementById("cashVal").textContent = cash;
      document.getElementById("upiVal").textContent = upi;
      document.getElementById("total").textContent = total;
    }

    ["openingCash", "closingCash", "upiIncome"].forEach(id =>
      document.getElementById(id).addEventListener("input", calculate)
    );

    async function saveIncome() {
      const date  = document.getElementById("dateInput").value; 
      const open = parseNumber(document.getElementById("openingCash").value);
      const close = parseNumber(document.getElementById("closingCash").value);
      const upi = parseNumber(document.getElementById("upiIncome").value);

      await fetch("https://shop-tracker-y8k2.onrender.com/records", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ date, open, close, upi }) 
      });

      document.getElementById("toast").classList.add("show");
    }

    document.getElementById("dateInput").valueAsDate = new Date();
  </script>
</body>
</html>
