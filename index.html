<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The New Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .shop-wrap {
      width: 100%;
      max-width: 420px;
      padding: 2rem 1.5rem 2.5rem;
    }

    .shop-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .shop-emblem {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #fff;
      border: 1px solid #e0ddd6;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
    }

    .shop-name {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      color: #1a1a18;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .shop-tagline {
      font-size: 12px;
      color: #888780;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .divider {
      width: 40px;
      height: 1.5px;
      background: #d3d1c7;
      margin: 1rem auto 0;
      border-radius: 2px;
    }

    .nav-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .nav-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 1.1rem 1.25rem;
      border-radius: 12px;
      border: 1px solid #e8e6e0;
      background: #ffffff;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }

    .nav-card:hover {
      border-color: #c8c6c0;
      background: #faf9f6;
    }

    .nav-card:active {
      transform: scale(0.99);
    }

    .nav-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-green { background: #EAF3DE; }
    .icon-red   { background: #FCEBEB; }
    .icon-gray  { background: #f1efe8; }

    .nav-text { flex: 1; }

    .nav-label {
      font-size: 15px;
      font-weight: 500;
      color: #1a1a18;
      margin-bottom: 2px;
    }

    .nav-desc {
      font-size: 12px;
      color: #888780;
    }

    .nav-arrow {
      color: #b4b2a9;
      font-size: 20px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="shop-wrap">
    <div class="shop-header">
      <div class="shop-emblem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 9l1.5-5h15L21 9" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 9h18v11a1 1 0 01-1 1H4a1 1 0 01-1-1V9z" stroke="#888780" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 20v-6h6v6" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 9c0 1.657 1.343 3 3 3s3-1.343 3-3" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M9 9c0 1.657 1.343 3 3 3s3-1.343 3-3" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
          <path d="M15 9c0 1.657 1.343 3 3 3s3-1.343 3-3" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="shop-name">The New Shop</h1>
      <p class="shop-tagline">Finance Manager</p>
      <div class="divider"></div>
    </div>

    <div class="nav-grid">
      <a href="income.html" class="nav-card">
        <div class="nav-icon icon-green">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="#3B6D11" stroke-width="1.5"/>
            <path d="M12 7v10M9 10l3-3 3 3" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="nav-text">
          <p class="nav-label">Add income</p>
          <p class="nav-desc">Record a new payment received</p>
        </div>
        <span class="nav-arrow">›</span>
      </a>

      <a href="expenses.html" class="nav-card">
        <div class="nav-icon icon-red">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="12" cy="12" r="9" stroke="#A32D2D" stroke-width="1.5"/>
            <path d="M12 17V7M9 14l3 3 3-3" stroke="#A32D2D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="nav-text">
          <p class="nav-label">Add expense</p>
          <p class="nav-desc">Log a cost or outgoing amount</p>
        </div>
        <span class="nav-arrow">›</span>
      </a>

      <a href="history.html" class="nav-card">
        <div class="nav-icon icon-gray">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4" width="16" height="16" rx="2" stroke="#888780" stroke-width="1.5"/>
            <path d="M8 9h8M8 13h5" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="nav-text">
          <p class="nav-label">View history</p>
          <p class="nav-desc">Browse past transactions</p>
        </div>
        <span class="nav-arrow">›</span>
      </a>
    </div>
  </div>
</body>
</html>
