<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Income — The New Shop</title>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0e0b;
      --ink-soft: #5a5850;
      --ink-ghost: #a8a49a;
      --paper: #f7f5f0;
      --paper-warm: #ede9e0;
      --white: #ffffff;
      --border: #e2ddd5;

      --blue: #2d4fa8;
      --blue-bg: #e8eeff;
      --blue-border: #b8c8f5;
      --blue-dark: #1a3580;

      --sage: #4a7c2f;
      --sage-bg: #eaf3e0;
      --crimson: #9b2c2c;
      --crimson-bg: #fceaea;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      padding: 2.5rem 1.25rem 5rem;
    }

    .wrap { max-width: 480px; margin: auto; }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-ghost);
      text-decoration: none;
      margin-bottom: 1.75rem;
      transition: color 0.15s;
    }
    .back:hover { color: var(--ink-soft); }

    .eyebrow {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--blue);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.02em;
      margin-bottom: 2rem;
    }

    /* Card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.5rem;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink-ghost);
      margin-bottom: 12px;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--paper);
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      color: var(--ink);
      transition: border-color 0.15s, background 0.15s;
    }

    input:focus {
      outline: none;
      border-color: var(--blue);
      background: var(--white);
    }

    /* Comparison panel */
    .comparison {
      background: var(--blue-bg);
      border: 1px solid var(--blue-border);
      border-radius: 18px;
      padding: 1.5rem;
      margin-bottom: 12px;
    }

    .comparison-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--blue);
      margin-bottom: 1rem;
    }

    .comp-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--blue-border);
      font-size: 14px;
    }

    .comp-row:last-child { border-bottom: none; }

    .comp-row .label { color: var(--ink-soft); }
    .comp-row .val { font-weight: 600; font-size: 15px; }

    .comp-row .val.green { color: var(--sage); }
    .comp-row .val.red   { color: var(--crimson); }
    .comp-row .val.neutral { color: var(--blue); }

    /* Verdict bar */
    .verdict {
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.3s;
    }

    .verdict.green { background: var(--sage-bg); }
    .verdict.red   { background: var(--crimson-bg); }
    .verdict.blue  { background: var(--blue-bg); }
    .verdict.neutral { background: var(--paper-warm); }

    .verdict-icon { font-size: 22px; }

    .verdict-text {
      font-size: 14px;
      font-weight: 500;
    }

    .verdict-text .sub {
      font-size: 12px;
      font-weight: 400;
      color: var(--ink-soft);
      margin-top: 2px;
    }

    /* Button */
    .btn-save {
      width: 100%;
      padding: 15px;
      background: var(--blue-dark);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'Outfit', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-save:hover  { background: var(--blue); }
    .btn-save:active { transform: scale(0.98); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--ink);
      color: #fff;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Loading spinner inline */
    .spin-sm {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--blue-border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
<div class="wrap">

  <a href="index.html" class="back">← The New Shop</a>

  <p class="eyebrow">Daily Entry</p>
  <h1>App Income</h1>

  <!-- Date -->
  <div class="card">
    <p class="card-label">Date</p>
    <input type="date" id="dateInput" />
  </div>

  <!-- App amount -->
  <div class="card">
    <p class="card-label">MyBillBook Total</p>
    <input type="text" id="appIncome" placeholder="Enter app total (e.g. 4500)" />
  </div>

  <!-- Comparison -->
  <div class="comparison">
    <p class="comparison-label">Comparison</p>
    <div class="comp-row">
      <span class="label">Shop Income</span>
      <span class="val neutral" id="shopVal">—</span>
    </div>
    <div class="comp-row">
      <span class="label">App Income</span>
      <span class="val neutral" id="appVal">—</span>
    </div>
    <div class="comp-row">
      <span class="label">Difference</span>
      <span class="val" id="diffVal">—</span>
    </div>
  </div>

  <!-- Verdict -->
  <div class="verdict neutral" id="verdict">
    <span class="verdict-icon">📋</span>
    <div class="verdict-text">
      Enter app total to compare
      <div class="sub">It'll check against today's shop data</div>
    </div>
  </div>

  <button class="btn-save" onclick="saveAppIncome()">Save App Income</button>

</div>

<div class="toast" id="toast">✓ Saved successfully</div>

<script>
  let shopIncome = 0;
  let fetching = false;

  const fmt = n => Number(n||0).toLocaleString('en-IN');

  async function fetchShopIncome(date) {
    try {
      const res = await fetch("https://shop-tracker-y8k2.onrender.com/records");
      const data = await res.json();
      const record = data.find(r => r.date === date);
      if (!record) return 0;
      return (record.close||0) - (record.open||0) + (record.upi||0);
    } catch { return 0; }
  }

  async function calculate() {
    const date = document.getElementById('dateInput').value;
    const app  = parseFloat(document.getElementById('appIncome').value) || 0;

    const shopEl  = document.getElementById('shopVal');
    const appEl   = document.getElementById('appVal');
    const diffEl  = document.getElementById('diffVal');
    const verdict = document.getElementById('verdict');

    if (!date) return;

    // Fetch shop data for selected date
    if (!fetching) {
      fetching = true;
      shopEl.innerHTML = `— <span class="spin-sm"></span>`;
      shopIncome = await fetchShopIncome(date);
      fetching = false;
    }

    shopEl.textContent = `₹${fmt(shopIncome)}`;
    appEl.textContent  = app > 0 ? `₹${fmt(app)}` : '—';

    if (app === 0) {
      diffEl.textContent  = '—';
      diffEl.className    = 'val neutral';
      verdict.className   = 'verdict neutral';
      verdict.innerHTML   = `<span class="verdict-icon">📋</span><div class="verdict-text">Enter app total to compare<div class="sub">It'll check against the shop record for this date</div></div>`;
      return;
    }

    const diff = app - shopIncome;
    const abs  = Math.abs(diff);

    if (diff === 0) {
      diffEl.textContent = '₹0';
      diffEl.className   = 'val green';
      verdict.className  = 'verdict green';
      verdict.innerHTML  = `<span class="verdict-icon">✅</span><div class="verdict-text">Perfect match!<div class="sub">App and shop figures are identical</div></div>`;
    } else if (diff > 0) {
      diffEl.textContent = `+₹${fmt(abs)}`;
      diffEl.className   = 'val red';
      verdict.className  = 'verdict red';
      verdict.innerHTML  = `<span class="verdict-icon">⚠️</span><div class="verdict-text">App is ₹${fmt(abs)} higher<div class="sub">Check for missing shop entries or billing errors</div></div>`;
    } else {
      diffEl.textContent = `-₹${fmt(abs)}`;
      diffEl.className   = 'val green';
      verdict.className  = 'verdict blue';
      verdict.innerHTML  = `<span class="verdict-icon">🔍</span><div class="verdict-text">Shop is ₹${fmt(abs)} higher<div class="sub">Check if app bills were all entered correctly</div></div>`;
    }
  }

  document.getElementById('appIncome').addEventListener('input', calculate);
  document.getElementById('dateInput').addEventListener('change', () => {
    shopIncome = 0; // reset cache on date change
    calculate();
  });

  async function saveAppIncome() {
    const date      = document.getElementById('dateInput').value;
    const appIncome = parseFloat(document.getElementById('appIncome').value) || 0;

    if (!date) { alert('Please pick a date.'); return; }

    const btn = document.querySelector('.btn-save');
    btn.textContent = 'Saving…';
    btn.disabled = true;

    try {
      await fetch("https://shop-tracker-y8k2.onrender.com/records", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ date, appIncome })
      });

      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    } catch(e) {
      alert('Save failed. Please try again.');
    }

    btn.textContent = 'Save App Income';
    btn.disabled = false;
  }

  // Default to today
  document.getElementById('dateInput').valueAsDate = new Date();
</script>
</body>
</html>
