<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>App Income — The New Shop</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue-light: #E7F0FF;
      --blue-mid:   #3A7BFF;
      --blue-dark:  #1E4FCC;

      --green: #3B6D11;
      --red: #A32D2D;

      --surface: #f5f4f0;
      --card: #ffffff;
      --border: #e8e6e0;

      --text: #1a1a18;
      --text-muted: #888780;
      --text-faint: #b4b2a9;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      color: var(--text);
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue-mid);
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 1rem;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 15px;
    }

    input:focus {
      border-color: var(--blue-mid);
      background: #fff;
      outline: none;
    }

    .display {
      background: var(--blue-light);
      border: 1px solid #c7d9ff;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 12px;
      text-align: center;
    }

    .display span {
      font-size: 18px;
      font-weight: 600;
    }

    .green { color: var(--green); }
    .red { color: var(--red); }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: var(--blue-dark);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }

    .btn-save:hover {
      background: var(--blue-mid);
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
      transition: 0.2s;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <a href="index.html" class="back">← The New Shop</a>

    <div class="page-header">
      <p class="eyebrow">Daily Entry</p>
      <h1>App Income</h1>
    </div>

    <!-- Date -->
    <div class="card">
      <p class="card-title">Date</p>
      <input type="date" id="dateInput">
    </div>

    <!-- Input -->
    <div class="card">
      <p class="card-title">App Earnings</p>
      <input type="text" id="appIncome" placeholder="Enter amount">
    </div>

    <!-- Result -->
    <div class="display">
      <span id="result">—</span>
    </div>

    <button class="btn-save" onclick="saveAppIncome()">Save income</button>

  </div>

  <div class="toast" id="toast">Saved!</div>

  <script>
    let shopTotal = 0;

    function parse(val) {
      return parseFloat(val) || 0;
    }

    async function fetchShopIncome(date) {
      try {
        const res = await fetch("https://shop-tracker-y8k2.onrender.com/records");
        const data = await res.json();

        const record = data.find(r => r.date === date);

        if (!record) return 0;

        const shopCash = (record.close || 0) - (record.open || 0);
        const upi = record.upi || 0;

        return shopCash + upi;

      } catch {
        return 0;
      }
    }

    async function calculate() {
      const date = document.getElementById("dateInput").value;
      const app = parse(document.getElementById("appIncome").value);

      if (!date) return;

      shopTotal = await fetchShopIncome(date);

      const diff = app - shopTotal;

      const result = document.getElementById("result");

      if (diff > 0) {
        result.innerHTML = `App is higher by ₹${diff}`;
        result.className = "green";
      } else if (diff < 0) {
        result.innerHTML = `Shop is higher by ₹${Math.abs(diff)}`;
        result.className = "red";
      } else {
        result.innerHTML = `Both are equal`;
        result.className = "";
      }
    }

    document.getElementById("appIncome").addEventListener("input", calculate);
    document.getElementById("dateInput").addEventListener("change", calculate);

    async function saveAppIncome() {
      const date = document.getElementById("dateInput").value;
      const appIncome = parse(document.getElementById("appIncome").value);

      await fetch("https://shop-tracker-y8k2.onrender.com/records", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ date, appIncome })
      });

      const toast = document.getElementById("toast");
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    document.getElementById("dateInput").valueAsDate = new Date();
  </script>
</body>
</html>
