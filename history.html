<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History — The New Shop</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --green-light: #EAF3DE;
      --green-mid:   #639922;
      --green-dark:  #3B6D11;
      --green-deep:  #27500A;
      --green-border:#c0dd97;

      --red-light:   #FCEBEB;
      --red-mid:     #E24B4A;
      --red-dark:    #A32D2D;
      --red-deep:    #791F1F;
      --red-border:  #F7C1C1;

      --surface:     #f5f4f0;
      --card:        #ffffff;
      --border:      #e8e6e0;
      --text:        #1a1a18;
      --text-muted:  #888780;
      --text-faint:  #b4b2a9;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      color: var(--text);
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .summary-row {
      display: flex;
      gap: 10px;
      margin-bottom: 2rem;
    }

    .summary-pill {
      flex: 1;
      padding: 1rem;
      border-radius: 14px;
    }

    .section {
      margin-bottom: 2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: right;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <a href="index.html" class="back">← The New Shop</a>

    <div class="page-header">
      <p>The New Shop</p>
      <h1>History</h1>
    </div>

    <!-- Summary -->
    <div class="summary-row">
      <div class="summary-pill">
        Income ₹<span id="sumIncome">—</span>
      </div>
      <div class="summary-pill">
        Expense ₹<span id="sumExpense">—</span>
      </div>
      <div class="summary-pill">
        Net ₹<span id="sumNet">—</span>
      </div>
    </div>

    <!-- Income -->
    <div class="section">
      <h3>Income</h3>
      <div id="incomeTableWrap"></div>
    </div>

    <!-- Expenses -->
    <div class="section">
      <h3>Expenses</h3>
      <div id="expenseTableWrap"></div>
    </div>

  </div>

  <div class="toast" id="toast">Deleted</div>

  <script>
    let records = [];

    function fmt(n) {
      return Number(n).toLocaleString('en-IN');
    }

    function fmtDate(d) {
      if (!d) return '-';
      return d;
    }

    async function loadRecords() {
      try {
        const res = await fetch("https://shop-tracker-y8k2.onrender.com/records");
        records = await res.json();
      } catch {
        records = [];
      }
      render();
    }

    function render() {
      const income = records.filter(r => r.open || r.upi);
      const expense = records.filter(r => r.exp || r.upiExp);

      const totalIncome = income.reduce((s, r) => s + (r.totalProfit || 0), 0);
      const totalExpense = expense.reduce((s, r) => s + Math.abs(r.totalProfit || 0), 0);

      document.getElementById("sumIncome").textContent = fmt(totalIncome);
      document.getElementById("sumExpense").textContent = fmt(totalExpense);
      document.getElementById("sumNet").textContent = fmt(totalIncome - totalExpense);

      renderIncomeTable(income);
      renderExpenseTable(expense);
    }

    function renderIncomeTable(rows) {
      document.getElementById("incomeTableWrap").innerHTML =
        rows.map(r => `<div>${fmtDate(r.date)} - ₹${fmt(r.totalProfit)}</div>`).join("");
    }

    function renderExpenseTable(rows) {
      document.getElementById("expenseTableWrap").innerHTML =
        rows.map(r => `<div>${fmtDate(r.date)} - ₹${fmt(r.exp + r.upiExp)}</div>`).join("");
    }

    loadRecords();
  </script>
</body>
</html>
