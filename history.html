<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>History — The New Shop</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-light:#EAF3DE; --green-dark:#3B6D11;
      --red-light:#FCEBEB; --red-dark:#A32D2D;
      --blue-light:#E7F0FF; --blue-dark:#1E4FCC;

      --surface:#f5f4f0; --card:#fff; --border:#e8e6e0;
      --text:#1a1a18; --text-muted:#888780; --text-faint:#b4b2a9;
    }

    body {
      font-family:'DM Sans',sans-serif;
      background:var(--surface);
      padding:2rem 1rem;
      color:var(--text);
    }

    .wrap { max-width:800px; margin:auto; }

    .page-header { margin-bottom:2rem; }
    .page-header h1 {
      font-family:'Playfair Display',serif;
      font-size:28px;
    }

    /* Buttons */
    .actions {
      display:flex;
      gap:10px;
      margin-bottom:2rem;
    }

    .btn {
      padding:8px 14px;
      border-radius:99px;
      font-size:13px;
      text-decoration:none;
      border:1px solid var(--border);
      background:var(--card);
      color:var(--text);
    }

    .btn.blue {
      background:var(--blue-light);
      color:var(--blue-dark);
      border-color:#c7d9ff;
    }

    /* Table card */
    .card {
      background:var(--card);
      border:1px solid var(--border);
      border-radius:16px;
      margin-bottom:2rem;
      overflow:hidden;
    }

    .card-header {
      display:flex;
      justify-content:space-between;
      padding:1rem;
      font-size:13px;
      color:var(--text-muted);
    }

    table {
      width:100%;
      border-collapse:collapse;
    }

    th {
      background:var(--surface);
      font-size:11px;
      text-transform:uppercase;
      color:var(--text-faint);
      padding:10px;
      text-align:right;
    }

    th:first-child, td:first-child { text-align:left; }

    td {
      padding:12px 10px;
      border-bottom:1px solid var(--border);
      text-align:right;
    }

    tr:last-child td { border-bottom:none; }

    .green { color:var(--green-dark); }
    .red { color:var(--red-dark); }
  </style>
</head>

<body>
<div class="wrap">

  <div class="page-header">
    <h1>History</h1>
  </div>

  <!-- Buttons -->
  <div class="actions">
    <a href="income.html" class="btn">+ Income</a>
    <a href="expenses.html" class="btn">+ Expense</a>
    <a href="appIncome.html" class="btn blue">+ App Income</a>
  </div>

  <!-- Income -->
  <div class="card">
    <div class="card-header">
      <span>Income</span>
      <span onclick="downloadCSV('income')" style="cursor:pointer;">Download</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Shop</th>
          <th>UPI</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="incomeBody"></tbody>
    </table>
  </div>

  <!-- Expense -->
  <div class="card">
    <div class="card-header">
      <span>Expenses</span>
      <span onclick="downloadCSV('expense')" style="cursor:pointer;">Download</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Cash</th>
          <th>UPI</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="expenseBody"></tbody>
    </table>
  </div>

  <!-- Summary -->
  <div class="card">
    <div class="card-header">
      <span>Date-wise Summary</span>
      <span onclick="downloadCSV('summary')" style="cursor:pointer;">Download</span>
    </div>
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Shop</th>
          <th>App</th>
          <th>Expense</th>
          <th>Net</th>
        </tr>
      </thead>
      <tbody id="summaryBody"></tbody>
    </table>
  </div>

</div>

<script>
let records = [];

function fmt(n) {
  return Number(n || 0).toLocaleString('en-IN');
}

async function load() {
  const res = await fetch("https://shop-tracker-y8k2.onrender.com/records");
  records = await res.json();
  render();
}

function render() {
  const iBody = document.getElementById("incomeBody");
  const eBody = document.getElementById("expenseBody");
  const sBody = document.getElementById("summaryBody");

  iBody.innerHTML = "";
  eBody.innerHTML = "";
  sBody.innerHTML = "";

  records.forEach(r => {
    const shop = (r.close||0)-(r.open||0);
    const upi = r.upi||0;
    const income = shop + upi;

    const exp = (r.exp||0)+(r.upiExp||0);
    const app = r.appIncome||0;

    if (income > 0) {
      iBody.innerHTML += `
        <tr>
          <td>${r.date}</td>
          <td class="green">₹${fmt(shop)}</td>
          <td class="green">₹${fmt(upi)}</td>
          <td class="green">₹${fmt(income)}</td>
        </tr>`;
    }

    if (exp > 0) {
      eBody.innerHTML += `
        <tr>
          <td>${r.date}</td>
          <td class="red">₹${fmt(r.exp)}</td>
          <td class="red">₹${fmt(r.upiExp)}</td>
          <td class="red">₹${fmt(exp)}</td>
        </tr>`;
    }

    const net = income + app - exp;

    sBody.innerHTML += `
      <tr>
        <td>${r.date}</td>
        <td>₹${fmt(income)}</td>
        <td>₹${fmt(app)}</td>
        <td>₹${fmt(exp)}</td>
        <td class="${net>=0?'green':'red'}">₹${fmt(net)}</td>
      </tr>`;
  });
}

function downloadCSV(type) {
  let rows = [];

  if (type === 'summary') {
    rows.push(["Date","Shop","App","Expense","Net"]);
    records.forEach(r => {
      const shop=(r.close||0)-(r.open||0)+(r.upi||0);
      const exp=(r.exp||0)+(r.upiExp||0);
      const app=r.appIncome||0;
      rows.push([r.date, shop, app, exp, shop+app-exp]);
    });
  }

  let csv = rows.map(r=>r.join(",")).join("\n");
  const blob = new Blob([csv]);
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = type + ".csv";
  a.click();
}

load();
</script>

</body>
</html>
