<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Entry — The New Shop</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --red-light:  #FCEBEB;
      --red-mid:    #E24B4A;
      --red-dark:   #A32D2D;
      --red-deep:   #791F1F;
      --red-border: #F7C1C1;
      --surface:    #f5f4f0;
      --card:       #ffffff;
      --border:     #e8e6e0;
      --border-mid: #d3d1c7;
      --text:       #1a1a18;
      --text-muted: #888780;
      --text-faint: #b4b2a9;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      min-height: 100vh;
      padding: 2rem 1rem 4rem;
      color: var(--text);
    }

    .wrap {
      max-width: 460px;
      margin: 0 auto;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-muted);
      text-decoration: none;
      margin-bottom: 1.5rem;
      transition: color 0.15s;
    }

    .back:hover {
      color: var(--text);
    }

    .page-header {
      margin-bottom: 2rem;
    }

    .page-header .eyebrow {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--red-mid);
      margin-bottom: 6px;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--text-faint);
      margin-bottom: 1rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    label {
      font-size: 13px;
      color: var(--text-muted);
    }

    input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 15px;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .display-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .display-pill {
      flex: 1;
      background: var(--surface);
      padding: 14px;
      border-radius: 12px;
    }

    .total-block {
      background: var(--red-light);
      padding: 1.25rem;
      display: flex;
      justify-content: space-between;
      border-radius: 14px;
      margin-bottom: 12px;
    }

    .btn-save {
      width: 100%;
      padding: 14px;
      background: var(--red-dark);
      color: white;
      border-radius: 12px;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 10px 20px;
      border-radius: 99px;
      opacity: 0;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="index.html" class="back">← The New Shop</a>

    <div class="page-header">
      <p class="eyebrow">Daily Entry</p>
      <h1>Expenses</h1>
    </div>

    <!-- Date -->
    <div class="card">
      <p class="card-title">Date</p>
      <input type="date" id="dateInput" />
    </div>

    <!-- Cash -->
    <div class="card">
      <p class="card-title">Cash</p>
      <input type="text" id="expenses" placeholder="200, 300" />
    </div>

    <!-- UPI -->
    <div class="card">
      <p class="card-title">UPI</p>
      <input type="text" id="upiExpenses" placeholder="100, 50" />
    </div>

    <div class="display-row">
      <div class="display-pill">Cash: ₹<span id="cashVal">0</span></div>
      <div class="display-pill">UPI: ₹<span id="upiVal">0</span></div>
    </div>

    <div class="total-block">
      <span>Total</span>
      <span>₹<span id="total">0</span></span>
    </div>

    <button class="btn-save" onclick="saveExpense()">Save</button>
  </div>

  <div class="toast" id="toast">Saved!</div>

  <script>
    function parseNumber(value) {
      if (!value) return 0;
      return value.split(",").reduce((sum, v) => sum + (parseFloat(v) || 0), 0);
    }

    function calculate() {
      const exp = parseNumber(document.getElementById("expenses").value);
      const upi = parseNumber(document.getElementById("upiExpenses").value);

      document.getElementById("cashVal").textContent = exp;
      document.getElementById("upiVal").textContent = upi;
      document.getElementById("total").textContent = exp + upi;
    }

    ["expenses", "upiExpenses"].forEach(id =>
      document.getElementById(id).addEventListener("input", calculate)
    );

    async function saveExpense() {
      const date  = document.getElementById("dateInput").value; 
      const exp = parseNumber(document.getElementById("expenses").value);
      const upi = parseNumber(document.getElementById("upiExpenses").value);

      await fetch("https://shop-tracker-y8k2.onrender.com/records", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ date, exp, upiExp: upi })
      });

      document.getElementById("toast").classList.add("show");
    }

    document.getElementById("dateInput").valueAsDate = new Date();
  </script>
</body>
</html>
